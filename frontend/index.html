<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBV Dashboard</title>
  <style>
    *{box-sizing:border-box} :root{--nav:#062629;--nav2:#04181b;--gold:#c99a2e;--gold2:#f2d68a;--bg:#f6f7f8;--card:#fff;--text:#142027;--muted:#6d7780;--line:#dfe4e8;--soft:#f3f6f7;--green:#1f7a3f;--greenbg:#e7f4e9;--blue:#476779;--bluebg:#e8eef2;--red:#a9342f;--redbg:#fbeaea;--amber:#9a6b14;--amberbg:#fff4d7} body{margin:0;font-family:Inter,"Segoe UI",Arial,sans-serif;background:linear-gradient(135deg,#f8fafb,#edf2f4);color:var(--text)} .hidden{display:none!important}.login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 0,#17484d 0,#062629 38%,#061012 100%)}.login-card{width:min(455px,100%);background:rgba(255,255,255,.98);border:1px solid rgba(201,154,46,.45);border-radius:24px;padding:34px;box-shadow:0 28px 90px rgba(0,0,0,.36)}.brand-panel{border:1px solid var(--gold);background:linear-gradient(160deg,#05282d,#041418);color:#fff;padding:18px 20px;border-radius:2px;margin-bottom:24px;letter-spacing:.06em}.brand-panel strong{display:block;font-family:Georgia,serif;font-size:31px;line-height:1}.brand-panel span{display:block;color:var(--gold2);font-size:12px;font-weight:700;margin-top:8px}.layout{display:flex;min-height:100vh}.sidebar{width:285px;position:fixed;inset:0 auto 0 0;background:linear-gradient(180deg,var(--nav),var(--nav2));color:#fff;padding:22px;box-shadow:8px 0 30px rgba(0,0,0,.18);overflow:auto}.side-brand{border:1px solid var(--gold);padding:16px 18px;margin-bottom:22px}.side-brand b{font-family:Georgia,serif;font-size:27px;line-height:1.05;letter-spacing:.08em}.side-brand small{display:block;color:var(--gold2);font-weight:700;margin-top:8px;letter-spacing:.08em}.nav-btn{width:100%;display:block;text-align:left;margin:5px 0;padding:13px 16px;border:1px solid transparent;border-radius:10px;background:transparent;color:#f4f7f8;font-weight:700;letter-spacing:.02em;cursor:pointer}.nav-btn:hover,.nav-btn.active{background:linear-gradient(90deg,rgba(201,154,46,.16),rgba(255,255,255,.06));border-color:rgba(201,154,46,.25)}.admin-label{margin:24px 0 8px;color:var(--gold2);font-size:12px;font-weight:800;letter-spacing:.12em;display:flex;align-items:center;gap:10px}.admin-label:after{content:"";height:1px;background:rgba(201,154,46,.45);flex:1}.user-box{margin-top:22px;padding:14px;border-radius:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)}.main{margin-left:285px;width:calc(100% - 285px);min-height:100vh}.appbar{height:64px;background:linear-gradient(90deg,#062629,#04181b);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:3}.appbar h1{margin:0;font-size:22px}.clock-line{font-weight:700;letter-spacing:.02em}.content{padding:24px 28px 32px} h2,h3{margin:0 0 14px} input,select,textarea{width:100%;padding:12px 13px;margin:7px 0;border:1px solid #d4dce1;border-radius:11px;background:#fff;font:inherit;color:var(--text);outline:none}textarea{min-height:94px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,154,46,.15)}.grid{display:grid;gap:16px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:repeat(3,1fr)}.four{grid-template-columns:repeat(4,1fr)}.panel,.stat,.record-card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 28px rgba(20,32,39,.06)}.panel{padding:18px}.stat{padding:20px}.stat span{display:block;color:var(--muted);font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase}.stat strong{display:block;font-size:34px;margin-top:7px}.stat p{margin:4px 0 0;color:var(--muted)}.btn{border:0;border-radius:10px;background:#142027;color:#fff;padding:10px 14px;margin:6px 6px 6px 0;font-weight:800;cursor:pointer}.btn:hover{filter:brightness(1.05)}.btn.gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#102024}.btn.ghost{background:#edf2f4;color:#142027}.btn.green{background:var(--green)}.btn.blue{background:var(--blue)}.btn.red{background:var(--red)}.muted{color:var(--muted);font-size:13px}.split{display:flex;justify-content:space-between;align-items:center;gap:12px}.toolbar{display:flex;gap:12px;align-items:center;margin:0 0 14px}.toolbar input,.toolbar select{margin:0}.pill{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:999px;background:#edf2f4;color:#20313a;font-weight:800;font-size:12px}.status-Available,.status-Active,.status-Confirmed,.status-Completed{background:var(--greenbg);color:var(--green)}.status-InUse,.status-InProgress,.status-Arrived{background:var(--bluebg);color:var(--blue)}.status-Reserved,.status-Booked,.status-Pending{background:var(--amberbg);color:var(--amber)}.status-Unavailable,.status-No-show,.status-Inactive{background:var(--redbg);color:var(--red)}.priority-High{background:var(--redbg);color:var(--red)}.priority-Medium{background:var(--amberbg);color:var(--amber)}.priority-Low{background:var(--greenbg);color:var(--green)}.table-wrap{overflow:auto}.app-table{width:100%;border-collapse:collapse}.app-table th{font-size:12px;text-align:left;color:#34444d;background:#f5f7f8;text-transform:uppercase;letter-spacing:.06em}.app-table th,.app-table td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle}.record-card{padding:15px;margin:12px 0;border-left:4px solid var(--gold)}.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0}.time-grid button{padding:11px;border:1px solid #cdd7dd;background:#fff;border-radius:9px;cursor:pointer;font-weight:800}.time-grid button.active{background:var(--gold);border-color:var(--gold);color:#0f2024}.availability-bar{height:8px;background:#e6ebee;border-radius:999px;overflow:hidden;width:140px}.availability-bar div{height:100%;background:var(--blue)}.modal{position:fixed;inset:0;background:rgba(4,24,27,.45);display:grid;place-items:center;z-index:10;padding:18px}.modal-card{width:min(650px,100%);background:#fff;border-radius:18px;border:1px solid var(--line);padding:20px;box-shadow:0 22px 80px rgba(0,0,0,.28)}.toast{position:fixed;right:22px;bottom:22px;background:#142027;color:#fff;padding:13px 16px;border-radius:12px;box-shadow:0 10px 28px rgba(0,0,0,.22);z-index:20}.settings-list{display:grid;gap:12px}.settings-item{padding:14px;border:1px solid var(--line);border-radius:14px;background:#fbfcfc}.danger{color:var(--red);font-weight:800}@media(max-width:1050px){.sidebar{position:static;width:100%;height:auto}.main{margin-left:0;width:100%}.layout{display:block}.two,.three,.four{grid-template-columns:1fr}.toolbar{flex-direction:column;align-items:stretch}.appbar{position:static;height:auto;gap:10px;align-items:flex-start;flex-direction:column;padding:18px}.content{padding:18px}.time-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div class="brand-panel"><strong>GLOBAL<br>BULLION VAULT</strong><span>Saftey Deposit Box </span></div>
    <h2>GBV STAFF Login</h2>
    <p class="muted">Welcome to GBV Dashboard</p>
    <input id="loginUsername" placeholder="Username" value="admin" autocomplete="username">
    <input id="loginPassword" type="password" placeholder="Password" value="admin123" autocomplete="current-password">
    <button class="btn gold" style="width:100%;margin-top:12px" onclick="login()">Login</button>
    <p id="loginError" class="danger"></p>
    <p class="muted">Use the provided user name and password</p>
  </div>
</div>

<div id="appView" class="layout hidden">
  <aside class="sidebar">
    <div class="side-brand"><b>GLOBAL<br>BULLION VAULT</b><small></small></div>
    <button class="nav-btn" data-page="dashboard" onclick="home()">Dashboard</button>
    <button class="nav-btn" data-page="customers" onclick="customers()">Customers</button>
    <button class="nav-btn" data-page="appointments" onclick="appointments()">Appointments</button>
    <button class="nav-btn" data-page="tasks" onclick="tasks()">Tasks</button>
    <button class="nav-btn" data-page="boxes" onclick="boxesPage()">Boxes</button>
    <button class="nav-btn" data-page="notes" onclick="notes()">Notes</button>
    <button class="nav-btn" data-page="reports" onclick="reportsPage()">Reports</button>
    <button class="nav-btn" data-page="settings" onclick="settingsPage()">Settings</button>
    <div id="adminBlock" class="hidden"><div class="admin-label">ADMIN ONLY</div><button class="nav-btn" data-page="users" onclick="usersPage()">Users (Admin)</button></div>
    <div class="user-box"><strong id="userNameBox">Staff</strong><br><span class="muted" id="userRoleBox">Role</span><br><button class="btn ghost" onclick="logout()">Logout</button></div>
  </aside>
  <section class="main">
    <div class="appbar"><h1 id="pageTitle">DASHBOARD</h1><div class="clock-line" id="topClock"></div></div>
    <div id="app" class="content"></div>
  </section>
</div>
<div id="modalRoot"></div><div id="toast" class="toast hidden"></div>
<script>
const API = location.protocol === 'file:' ? 'http://localhost:3000' : '';
let selectedTime='', currentUser=null, customerCache=[], boxCache=[];
const boxSizes=['Small A','Small B','Small C','Medium A','Medium B','Large A','Large B'];
const boxStatuses=['Available','In Use','Reserved','Unavailable'];
function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
function statusClass(v){return 'status-'+String(v||'').replaceAll(' ','');}
function fmtDate(v){return v?new Date(v).toLocaleString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'-';}
function dateOnly(v){return v?new Date(v).toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}):'-';}
function todayISO(){return new Date().toISOString().slice(0,10)}
function token(){return localStorage.getItem('gbv_token')||''}
async function api(path,options={}){options.headers={'Content-Type':'application/json','Authorization':'Bearer '+token(),...(options.headers||{})};const res=await fetch(API+path,options);const data=await res.json().catch(()=>({}));if(!res.ok){if(res.status===401)showLogin();throw new Error(data.error||'Request failed')}return data}
function setActive(page){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===page));pageTitle.textContent=page.charAt(0).toUpperCase()+page.slice(1)}
function topClockTick(){topClock.textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})+'  |  '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}setInterval(topClockTick,1000);topClockTick();
function toastMsg(m){toast.textContent=m;toast.classList.remove('hidden');setTimeout(()=>toast.classList.add('hidden'),2400)}
function showLogin(){loginView.classList.remove('hidden');appView.classList.add('hidden');localStorage.removeItem('gbv_token')}
function showApp(){loginView.classList.add('hidden');appView.classList.remove('hidden');userNameBox.textContent=currentUser?.name||'Staff';userRoleBox.textContent=(currentUser?.role||'staff').toUpperCase();adminBlock.classList.toggle('hidden',currentUser?.role!=='admin')}
async function login(){try{loginError.textContent='';const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:loginUsername.value,password:loginPassword.value})});const data=await r.json();if(!r.ok)throw new Error(data.error);localStorage.setItem('gbv_token',data.token);currentUser=data.user;showApp();home()}catch(e){loginError.textContent=e.message}}
async function logout(){try{await api('/auth/logout',{method:'POST'})}catch{}showLogin()}
async function boot(){if(!token())return showLogin();try{const me=await api('/auth/me');currentUser=me.user;showApp();home()}catch{showLogin()}}
function table(headers, rows){return `<div class="table-wrap"><table class="app-table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.join('')||`<tr><td colspan="${headers.length}" class="muted">No records found.</td></tr>`}</tbody></table></div>`}

async function home(){setActive('dashboard');app.innerHTML='<p class="muted">Loading dashboard...</p>';const [appts,tasks,customers,boxes,notes]=await Promise.all([api('/appointments'),api('/tasks'),api('/customers'),api('/boxes'),api('/notes')]);const today=todayISO();const todayAppts=appts.filter(a=>String(a.date_time).slice(0,10)===today);const pending=tasks.filter(t=>t.status!=='Completed');const available=boxes.filter(b=>b.availability==='Available').length;const inUse=boxes.filter(b=>b.availability==='In Use').length;app.innerHTML=`
  <div class="grid four"><div class="stat"><span>Today’s Appointments</span><strong>${todayAppts.length}</strong><p>Confirmed and pending visits</p></div><div class="stat"><span>Open Tasks</span><strong>${pending.length}</strong><p>Staff work requiring action</p></div><div class="stat"><span>Active Customers</span><strong>${customers.filter(c=>c.status!=='Inactive').length}</strong><p>Stored customer records</p></div><div class="stat"><span>Box Availability</span><strong>${available}</strong><p>${inUse} boxes currently in use</p></div></div>
  <section class="panel" style="margin-top:16px"><div class="split"><h3>Box Availability</h3><button class="btn ghost" onclick="boxesPage()">Manage boxes</button></div>${renderBoxAvailability(boxes)}</section>
  <div class="grid two" style="margin-top:16px"><section class="panel"><div class="split"><h3>Today’s Appointments</h3><button class="btn ghost" onclick="appointments()">Open appointments</button></div>${appointmentTable(todayAppts.slice(0,6),true)}</section><section class="panel"><div class="split"><h3>Priority Tasks</h3><button class="btn ghost" onclick="tasks()">Open tasks</button></div>${renderTasks(pending.slice(0,5),true)}</section></div>
  <section class="panel" style="margin-top:16px"><h3>Customer Quick Search</h3><div class="toolbar"><input id="dashSearch" placeholder="Search by name, phone, email or box number" oninput="dashboardCustomerSearch()"></div><div id="dashCustomerResults" class="grid three"></div></section>`}
function renderBoxAvailability(data){const grouped=boxSizes.map(size=>{const list=data.filter(b=>b.size===size);const total=list.length;const av=list.filter(b=>b.availability==='Available').length;const use=list.filter(b=>b.availability==='In Use').length;const pct=total?Math.round((use/total)*100):0;return `<tr><td><strong>${size}</strong></td><td>${total}</td><td><span class="pill status-Available">${av}</span></td><td><span class="pill status-InUse">${use}</span></td><td><div class="split" style="justify-content:flex-start"><div class="availability-bar"><div style="width:${pct}%"></div></div><span class="muted">${pct}%</span></div></td><td><span class="pill ${av>0?'status-Available':'status-InUse'}">${av>0?'Available':'In Use'}</span></td></tr>`});return table(['Box Type','Total','Available','In Use','Occupancy','Status'],grouped)}
async function dashboardCustomerSearch(){const q=dashSearch.value;if(q.trim().length<1){dashCustomerResults.innerHTML='';return}const data=await api('/customers?search='+encodeURIComponent(q));dashCustomerResults.innerHTML=data.slice(0,6).map(renderCustomerCard).join('')||'<p class="muted">No customers found.</p>'}

async function customers(){setActive('customers');app.innerHTML=`<div class="grid two"><section class="panel"><h3>Add Customer</h3><p class="muted">Create a clean customer profile for quick searching and appointment booking.</p><input id="cName" placeholder="Customer full name"><input id="cEmail" placeholder="Email"><input id="cPhone" placeholder="Phone"><input id="cVault" placeholder="Assigned box number"><select id="cStatus"><option>Active</option><option>Prospect</option><option>Inactive</option></select><input id="cAddress" placeholder="Address / postcode"><input id="cEmergency" placeholder="Emergency contact / authorised person"><textarea id="cNotes" placeholder="Internal notes"></textarea><button class="btn gold" onclick="addCustomer()">Save Customer</button></section><section class="panel"><h3>Customer Directory</h3><div class="toolbar"><input id="customerSearch" placeholder="Search name, phone, email, status or box" oninput="loadCustomers()"></div><div id="customerList" class="grid"></div></section></div>`;loadCustomers()}
async function loadCustomers(){const q=document.getElementById('customerSearch')?.value||'';const data=await api('/customers?search='+encodeURIComponent(q));customerCache=data;customerList.innerHTML=data.map(renderCustomerCard).join('')||'<p class="muted">No customer records.</p>'}
function renderCustomerCard(c){return `<div class="record-card"><div class="split"><strong>${escapeHtml(c.name)}</strong><span class="pill ${statusClass(c.status||'Active')}">${escapeHtml(c.status||'Active')}</span></div><div class="muted">Box: ${escapeHtml(c.vault_number||'-')} | Phone: ${escapeHtml(c.phone||'-')} | Email: ${escapeHtml(c.email||'-')}</div>${c.address?`<div class="muted">Address: ${escapeHtml(c.address)}</div>`:''}${c.emergency_contact?`<div class="muted">Authorised contact: ${escapeHtml(c.emergency_contact)}</div>`:''}${c.notes?`<p>${escapeHtml(c.notes)}</p>`:''}<button class="btn ghost" onclick="editCustomer(${c.id})">Edit</button><button class="btn red" onclick="deleteCustomer(${c.id})">Delete</button></div>`}
async function addCustomer(){await api('/customers',{method:'POST',body:JSON.stringify({name:cName.value,email:cEmail.value,phone:cPhone.value,vault_number:cVault.value,status:cStatus.value,address:cAddress.value,emergency_contact:cEmergency.value,notes:cNotes.value})});toastMsg('Customer saved');customers()}
function editCustomer(id){const c=customerCache.find(x=>x.id===id);if(!c)return;modalRoot.innerHTML=`<div class="modal"><div class="modal-card"><div class="split"><h3>Edit Customer</h3><button class="btn ghost" onclick="closeModal()">Close</button></div><input id="eName" value="${escapeHtml(c.name)}"><input id="eEmail" value="${escapeHtml(c.email||'')}" placeholder="Email"><input id="ePhone" value="${escapeHtml(c.phone||'')}" placeholder="Phone"><input id="eVault" value="${escapeHtml(c.vault_number||'')}" placeholder="Box number"><select id="eStatus">${['Active','Prospect','Inactive'].map(s=>`<option ${s===(c.status||'Active')?'selected':''}>${s}</option>`).join('')}</select><input id="eAddress" value="${escapeHtml(c.address||'')}" placeholder="Address"><input id="eEmergency" value="${escapeHtml(c.emergency_contact||'')}" placeholder="Authorised contact"><textarea id="eNotes">${escapeHtml(c.notes||'')}</textarea><button class="btn gold" onclick="saveCustomer(${id})">Save Changes</button></div></div>`}
async function saveCustomer(id){await api('/customers/'+id,{method:'PUT',body:JSON.stringify({name:eName.value,email:eEmail.value,phone:ePhone.value,vault_number:eVault.value,status:eStatus.value,address:eAddress.value,emergency_contact:eEmergency.value,notes:eNotes.value})});closeModal();loadCustomers();toastMsg('Customer updated')}
async function deleteCustomer(id){if(confirm('Delete this customer record?')){await api('/customers/'+id,{method:'DELETE'});loadCustomers()}}
function closeModal(){modalRoot.innerHTML=''}

async function appointments(){setActive('appointments');selectedTime='';app.innerHTML=`<div class="grid two"><section class="panel"><h3>Book Appointment</h3><p class="muted">Select a customer or type details manually. The appointment record keeps status and visit progress.</p><select id="cSel" onchange="fillCustomer()"></select><div class="grid two"><input id="aname" placeholder="Customer name"><input id="abox" placeholder="Box number"></div><div class="grid two"><input id="aphone" placeholder="Phone"><input id="aemail" placeholder="Email"></div><div class="grid two"><input id="adate" type="date"><select id="apurpose"><option>Vault visit</option><option>New enquiry</option><option>Payment / renewal</option><option>Box upgrade</option><option>Document check</option><option>Other</option></select></div><div class="muted">Choose appointment time</div><div class="time-grid" id="timeGrid"></div><textarea id="anotes" placeholder="Appointment notes"></textarea><button class="btn gold" onclick="addAppt()">Book Appointment</button></section><section class="panel"><div class="split"><h3>Appointment Schedule</h3><select id="apptFilter" onchange="loadAppt()"><option value="all">All</option><option>Booked</option><option>Confirmed</option><option>Arrived</option><option>Completed</option><option>No-show</option></select></div><div id="aList"></div></section></div>`;renderTimeButtons();await loadCustomersDropdown();await loadAppt()}
function renderTimeButtons(){const times=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','14:00','14:30','15:00','15:30','16:00'];timeGrid.innerHTML=times.map(t=>`<button onclick="selectTime('${t}',this)">${t}</button>`).join('')}
function selectTime(t,btn){selectedTime=t;document.querySelectorAll('.time-grid button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
async function loadCustomersDropdown(){const data=await api('/customers');customerCache=data;cSel.innerHTML='<option value="">Select existing customer</option>'+data.map(c=>`<option value="${c.id}">${escapeHtml(c.name)} ${c.vault_number?'- '+escapeHtml(c.vault_number):''}</option>`).join('')}
function fillCustomer(){const c=customerCache.find(x=>String(x.id)===String(cSel.value));if(!c)return;aname.value=c.name||'';aemail.value=c.email||'';aphone.value=c.phone||'';abox.value=c.vault_number||''}
async function loadAppt(){const data=await api('/appointments');const f=document.getElementById('apptFilter')?.value||'all';const shown=f==='all'?data:data.filter(a=>a.status===f);aList.innerHTML=appointmentTable(shown,false)}
function appointmentTable(data,compact=false){return table(['Time','Customer','Box','Purpose','Status',...(compact?[]:['Actions'])],data.map(a=>`<tr><td>${fmtDate(a.date_time)}</td><td><strong>${escapeHtml(a.name)}</strong><div class="muted">${escapeHtml(a.phone||a.email||'')}</div></td><td>${escapeHtml(a.box_number||'-')}</td><td>${escapeHtml(a.purpose||'Visit')}</td><td><span class="pill ${statusClass(a.status||'Booked')}">${escapeHtml(a.status||'Booked')}</span></td>${compact?'':`<td><button class="btn blue" onclick="setApptStatus(${a.id},'Confirmed')">Confirm</button><button class="btn green" onclick="setApptStatus(${a.id},'Arrived')">Arrived</button><button class="btn green" onclick="setApptStatus(${a.id},'Completed')">Complete</button><button class="btn ghost" onclick="setApptStatus(${a.id},'No-show')">No-show</button><button class="btn red" onclick="deleteAppt(${a.id})">Delete</button></td>`}</tr>`))}
async function addAppt(){if(!adate.value||!selectedTime)return alert('Please select date and time.');await api('/appointments',{method:'POST',body:JSON.stringify({customer_id:cSel.value,name:aname.value,phone:aphone.value,email:aemail.value,box_number:abox.value,date_time:`${adate.value}T${selectedTime}`,purpose:apurpose.value,notes:anotes.value})});toastMsg('Appointment booked');appointments()}
async function setApptStatus(id,status){await api('/appointments/'+id+'/status',{method:'PUT',body:JSON.stringify({status})});loadAppt();toastMsg('Appointment updated')}
async function deleteAppt(id){if(confirm('Delete this appointment?')){await api('/appointments/'+id,{method:'DELETE'});loadAppt()}}

async function boxesPage(){setActive('boxes');app.innerHTML=`<div class="grid two"><section class="panel"><h3>Add / Register Box</h3><p class="muted">Manual box inventory. Add a box number, choose the size and update availability whenever the box status changes.</p><input id="bNumber" placeholder="Box number, e.g. SMA-0124"><select id="bSize">${boxSizes.map(s=>`<option>${s}</option>`).join('')}</select><select id="bStatus">${boxStatuses.map(s=>`<option>${s}</option>`).join('')}</select><input id="bCustomer" placeholder="Customer name / holder, optional"><textarea id="bNotes" placeholder="Box notes"></textarea><button class="btn gold" onclick="addBox()">Save Box</button></section><section class="panel"><div class="split"><h3>Box Inventory</h3><input style="max-width:300px" id="boxSearch" placeholder="Search boxes" oninput="loadBoxes()"></div><div id="boxSummary"></div><div id="boxList"></div></section></div>`;loadBoxes()}
async function loadBoxes(){const q=document.getElementById('boxSearch')?.value||'';const data=await api('/boxes?search='+encodeURIComponent(q));boxCache=data;boxSummary.innerHTML=renderBoxAvailability(data);boxList.innerHTML=boxTable(data)}
function boxTable(data){return table(['Box Number','Size','Holder','Availability','Updated','Actions'],data.map(b=>`<tr><td><strong>${escapeHtml(b.box_number)}</strong></td><td>${escapeHtml(b.size)}</td><td>${escapeHtml(b.customer_name||'-')}</td><td><span class="pill ${statusClass(b.availability)}">${escapeHtml(b.availability)}</span></td><td><span class="muted">${fmtDate(b.updated_at)} by ${escapeHtml(b.updated_by||'-')}</span></td><td><button class="btn ghost" onclick="editBox(${b.id})">Edit</button><button class="btn red" onclick="deleteBox(${b.id})">Delete</button></td></tr>`))}
async function addBox(){await api('/boxes',{method:'POST',body:JSON.stringify({box_number:bNumber.value,size:bSize.value,availability:bStatus.value,customer_name:bCustomer.value,notes:bNotes.value})});toastMsg('Box saved');boxesPage()}
function editBox(id){const b=boxCache.find(x=>x.id===id);if(!b)return;modalRoot.innerHTML=`<div class="modal"><div class="modal-card"><div class="split"><h3>Edit Box</h3><button class="btn ghost" onclick="closeModal()">Close</button></div><input id="ebNumber" value="${escapeHtml(b.box_number)}"><select id="ebSize">${boxSizes.map(s=>`<option ${s===b.size?'selected':''}>${s}</option>`).join('')}</select><select id="ebStatus">${boxStatuses.map(s=>`<option ${s===b.availability?'selected':''}>${s}</option>`).join('')}</select><input id="ebCustomer" value="${escapeHtml(b.customer_name||'')}" placeholder="Customer / holder"><textarea id="ebNotes">${escapeHtml(b.notes||'')}</textarea><button class="btn gold" onclick="saveBox(${id})">Save Changes</button></div></div>`}
async function saveBox(id){await api('/boxes/'+id,{method:'PUT',body:JSON.stringify({box_number:ebNumber.value,size:ebSize.value,availability:ebStatus.value,customer_name:ebCustomer.value,notes:ebNotes.value})});closeModal();loadBoxes();toastMsg('Box updated')}
async function deleteBox(id){if(confirm('Delete this box record?')){await api('/boxes/'+id,{method:'DELETE'});loadBoxes()}}

async function tasks(){setActive('tasks');const staff=await api('/staff');app.innerHTML=`<div class="grid two"><section class="panel"><h3>Create Task</h3><input id="taskTitle" placeholder="Task title"><textarea id="taskDesc" placeholder="Task details"></textarea><select id="taskAssigned"><option>Unassigned</option>${staff.map(u=>`<option>${escapeHtml(u.name||u.username)}</option>`).join('')}</select><select id="taskPriority"><option>Medium</option><option>High</option><option>Low</option></select><input id="taskDue" type="date"><button class="btn gold" onclick="addTask()">Create Task</button></section><section class="panel"><div class="split"><h3>Task Board</h3><select id="taskFilter" onchange="loadTasks()"><option value="all">All Tasks</option><option>Pending</option><option>In Progress</option><option>Completed</option></select></div><div id="taskList"></div></section></div>`;loadTasks()}
async function loadTasks(){const data=await api('/tasks');const f=document.getElementById('taskFilter')?.value||'all';taskList.innerHTML=renderTasks(f==='all'?data:data.filter(t=>t.status===f),false)}
function renderTasks(data,compact=false){const today=todayISO();return data.map(t=>{const overdue=t.status!=='Completed'&&t.due_date&&t.due_date<today;return `<div class="record-card"><div class="split"><strong>${escapeHtml(t.title)}</strong><span class="pill priority-${escapeHtml(t.priority||'Medium')}">${escapeHtml(t.priority||'Medium')}</span></div><div class="muted">Assigned to: ${escapeHtml(t.assigned_to||'-')} | Created by: ${escapeHtml(t.created_by||'-')}</div>${t.description&&!compact?`<p>${escapeHtml(t.description)}</p>`:''}<span class="pill ${statusClass(t.status||'Pending')}">${escapeHtml(t.status||'Pending')}</span>${t.due_date?` <span class="pill ${overdue?'status-Unavailable':''}">Due: ${dateOnly(t.due_date)}</span>`:''}${t.completed_at?`<div class="muted">Completed by ${escapeHtml(t.completed_by||'-')} on ${fmtDate(t.completed_at)}</div>`:''}${compact?'':`<br><button class="btn ghost" onclick="setTaskStatus(${t.id},'Pending')">Pending</button><button class="btn blue" onclick="setTaskStatus(${t.id},'In Progress')">In Progress</button><button class="btn green" onclick="setTaskStatus(${t.id},'Completed')">Complete</button><button class="btn red" onclick="deleteTask(${t.id})">Delete</button>`}</div>`}).join('')||'<p class="muted">No tasks.</p>'}
async function addTask(){await api('/tasks',{method:'POST',body:JSON.stringify({title:taskTitle.value,description:taskDesc.value,assigned_to:taskAssigned.value,priority:taskPriority.value,due_date:taskDue.value,status:'Pending'})});tasks()}
async function setTaskStatus(id,status){await api('/tasks/'+id+'/status',{method:'PUT',body:JSON.stringify({status})});loadTasks()}
async function deleteTask(id){if(confirm('Delete this task?')){await api('/tasks/'+id,{method:'DELETE'});loadTasks()}}

async function notes(){setActive('notes');app.innerHTML=`<div class="grid two"><section class="panel"><h3>Add Internal Log</h3><input id="noteTitle" placeholder="Title"><textarea id="noteBody" placeholder="Customer visit, payment issue, daily handover or internal note"></textarea><button class="btn gold" onclick="addNote()">Save Log</button></section><section class="panel"><h3>Saved Logs</h3><div id="noteList"></div></section></div>`;loadNotes()}
async function loadNotes(){const data=await api('/notes');noteList.innerHTML=data.map(n=>`<div class="record-card"><strong>${escapeHtml(n.title||'Note')}</strong><p>${escapeHtml(n.body)}</p><span class="muted">${fmtDate(n.created_at)} by ${escapeHtml(n.created_by||'-')}</span><br><button class="btn red" onclick="deleteNote(${n.id})">Delete</button></div>`).join('')||'<p class="muted">No logs.</p>'}
async function addNote(){await api('/notes',{method:'POST',body:JSON.stringify({title:noteTitle.value,body:noteBody.value})});notes()}
async function deleteNote(id){if(confirm('Delete this log?')){await api('/notes/'+id,{method:'DELETE'});loadNotes()}}
async function reportsPage(){setActive('reports');const [customers,boxes,appts,tasks]=await Promise.all([api('/customers'),api('/boxes'),api('/appointments'),api('/tasks')]);app.innerHTML=`<div class="grid four"><div class="stat"><span>Customers</span><strong>${customers.length}</strong></div><div class="stat"><span>Boxes</span><strong>${boxes.length}</strong></div><div class="stat"><span>Available</span><strong>${boxes.filter(b=>b.availability==='Available').length}</strong></div><div class="stat"><span>Open Tasks</span><strong>${tasks.filter(t=>t.status!=='Completed').length}</strong></div></div><section class="panel" style="margin-top:16px"><h3>Operational Snapshot</h3>${renderBoxAvailability(boxes)}</section>`}

async function settingsPage(){setActive('settings');const settings=await api('/settings');app.innerHTML=`<div class="grid two"><section class="panel"><h3>My Account</h3><p class="muted">Change your login name and password. Use one account per staff member for remote access.</p><input id="profileName" value="${escapeHtml(currentUser.name||'')}" placeholder="Your name"><input id="profileUsername" value="${escapeHtml(currentUser.username||'')}" placeholder="Username"><button class="btn gold" onclick="saveProfile()">Update Profile</button><hr><input id="currentPass" type="password" placeholder="Current password"><input id="newPass" type="password" placeholder="New password, minimum 8 characters"><button class="btn" onclick="changePassword()">Change Password</button></section><section class="panel"><h3>Remote Hosting & Security</h3><div class="settings-list"><div class="settings-item"><strong>HTTPS required</strong><p class="muted">When hosted remotely, use the platform SSL certificate and never use plain HTTP for staff logins.</p></div><div class="settings-item"><strong>Individual accounts</strong><p class="muted">Create separate accounts for the other 3 staff. Do not share the admin login.</p></div><div class="settings-item"><strong>Role control</strong><p class="muted">Only admins can open Users and change system settings. Staff can manage day-to-day records.</p></div><div class="settings-item"><strong>Database</strong><p class="muted">SQLite works for light use. For long-term multi-user hosting, migrate to PostgreSQL or MySQL with backups.</p></div></div></section></div>${currentUser.role==='admin'?`<section class="panel" style="margin-top:16px"><h3>Business Settings</h3><div class="grid two"><input id="setCompany" value="${escapeHtml(settings.company_name||'')}" placeholder="Company name"><input id="setBranch" value="${escapeHtml(settings.branch_name||'')}" placeholder="Branch name"><input id="setEmail" value="${escapeHtml(settings.support_email||'')}" placeholder="Support email"><input id="setPhone" value="${escapeHtml(settings.support_phone||'')}" placeholder="Support phone"><input id="setTimeout" value="${escapeHtml(settings.session_timeout_minutes||'480')}" placeholder="Session timeout minutes"></div><textarea id="setNote">${escapeHtml(settings.remote_access_note||'')}</textarea><button class="btn gold" onclick="saveSettings()">Save Business Settings</button></section>`:''}`}
async function saveProfile(){const data=await api('/auth/profile',{method:'PUT',body:JSON.stringify({name:profileName.value,username:profileUsername.value})});currentUser=data.user;showApp();toastMsg('Profile updated')}
async function changePassword(){await api('/auth/change-password',{method:'PUT',body:JSON.stringify({current_password:currentPass.value,new_password:newPass.value})});toastMsg('Password changed');currentPass.value='';newPass.value=''}
async function saveSettings(){await api('/settings',{method:'PUT',body:JSON.stringify({company_name:setCompany.value,branch_name:setBranch.value,support_email:setEmail.value,support_phone:setPhone.value,session_timeout_minutes:setTimeout.value,remote_access_note:setNote.value})});toastMsg('Settings saved')}

async function usersPage(){setActive('users');if(currentUser.role!=='admin')return app.innerHTML='<section class="panel"><h3>Admin access required</h3></section>';const users=await api('/users');app.innerHTML=`<div class="grid two"><section class="panel"><h3>Create Staff User</h3><input id="uName" placeholder="Full name"><input id="uUsername" placeholder="Username"><input id="uPassword" type="password" placeholder="Password, minimum 8 characters"><select id="uRole"><option value="staff">Staff</option><option value="admin">Admin</option></select><button class="btn gold" onclick="addUser()">Create User</button><p class="muted">Use this for the 3 remote staff instead of sharing one login.</p></section><section class="panel"><h3>Current Users</h3>${table(['Name','Username','Role','Active','Last Login'],users.map(u=>`<tr><td>${escapeHtml(u.name||'-')}</td><td>${escapeHtml(u.username)}</td><td><span class="pill">${escapeHtml(u.role)}</span></td><td>${u.active?'<span class="pill status-Active">Active</span>':'<span class="pill status-Inactive">Inactive</span>'}</td><td>${fmtDate(u.last_login)}</td></tr>`))}</section></div>`}
async function addUser(){await api('/users',{method:'POST',body:JSON.stringify({name:uName.value,username:uUsername.value,password:uPassword.value,role:uRole.value})});toastMsg('User created');usersPage()}
boot();
</script>
</body>
</html>
